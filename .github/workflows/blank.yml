name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate browser scripts syntax
        run: node --check app.js && node --check flymaster-client.js && node --check igc-parser.js
      - name: Run integration tests
        run: node --test
