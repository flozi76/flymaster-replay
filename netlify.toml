# Netlify configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Publish the repo root (no build step needed — pure static files)
  publish = "."
  # Serverless functions directory
  functions = "netlify/functions"

# Redirect all routes to index.html so client-side navigation works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
