server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Flymaster API reverse proxy (avoids browser CORS restrictions) ─────
    # Used by Docker / self-hosted deployments.
    # The browser fetches /api/lb/... and /api/lt/... (same-origin), and
    # nginx forwards the request server-side to the real Flymaster hosts.
    location /api/lb/ {
        proxy_pass              https://lb.flymaster.net/;
        proxy_ssl_server_name   on;
        proxy_set_header        Host lb.flymaster.net;
        proxy_set_header        User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36";
        proxy_set_header        Accept "application/json";
        proxy_hide_header       Access-Control-Allow-Origin;
        add_header              Access-Control-Allow-Origin * always;
        proxy_cache_bypass      $http_pragma;
        proxy_no_cache          $http_pragma;
    }

    location /api/lt/ {
        proxy_pass              https://lt.flymaster.net/;
        proxy_ssl_server_name   on;
        proxy_set_header        Host lt.flymaster.net;
        proxy_set_header        User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36";
        proxy_set_header        Accept "application/json";
        proxy_hide_header       Access-Control-Allow-Origin;
        add_header              Access-Control-Allow-Origin * always;
        proxy_cache_bypass      $http_pragma;
        proxy_no_cache          $http_pragma;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    # Content-Security-Policy: allows Leaflet + OpenStreetMap tiles from CDN.
    # connect-src includes lb/lt.flymaster.net so GitHub Pages (direct mode)
    # still works as best as possible.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' https://unpkg.com; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self' https://*.openstreetmap.org https://lb.flymaster.net https://lt.flymaster.net;";

    # Disable access logs for favicon/robots
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
